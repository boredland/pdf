name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    # Cancel superseded typecheck runs as soon as a new commit lands on
    # the same ref — no point spending CI on stale work.
    concurrency:
      group: typecheck-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  e2e:
    # Runs in parallel with typecheck + deploy but doesn't block deploy —
    # the suite is ~3 minutes today and we'd rather not stall every push
    # behind it. Failures still surface on the commit status + PR.
    concurrency:
      group: e2e-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run e2e tests
        run: bun run test:e2e
        env:
          VITE_BASE_PATH: /
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: typecheck
    # Keep the GitHub Pages deployment single-flight per the Actions
    # recommendation: let an in-flight deploy complete before the next
    # one starts, rather than cancelling mid-publish.
    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Resolve example PDF (optional)
        if: ${{ env.NARA_API_KEY != '' }}
        env:
          NARA_API_KEY: ${{ secrets.NARA_API_KEY }}
        run: bun run scripts/resolve-example-pdf.ts || echo "resolver failed; using committed fallback"
      - name: Build
        run: bun run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
      - name: Copy 404 fallback
        run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
